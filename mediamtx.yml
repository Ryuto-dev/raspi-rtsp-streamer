###############################################
# Raspberry Pi 5 RTSP Streamer 用の最小 MediaMTX 設定
#   - ffmpeg-rtsp.service が localhost:8554 へ MJPEG→H.264 を publish
#   - 視聴者は rtsp://<RaspiのIP>:8554/live で受信
###############################################

# ログレベル: error / warn / info / debug
logLevel: info
logDestinations: [stdout]

# 読み取り/書き込みタイムアウト
readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512

###############################################
# RTSP サーバ (8554/tcp + UDP)
###############################################
rtsp: yes
rtspTransports: [tcp, udp, multicast]
rtspEncryption: "no"
rtspAddress: :8554

###############################################
# 他プロトコルは無効化 (必要なら yes に変更)
###############################################
rtmp: no
hls: no
webrtc: no
srt: no

###############################################
# パス定義
#   - 'all_others' は任意のパスに対する既定設定
#   - 'live' は明示的に publisher を待つ
###############################################
pathDefaults:
  source: publisher
  # 公開者が再接続したときに以前のセッションを切る
  sourceOnDemand: no

paths:
  live:
    source: publisher
  all_others:
